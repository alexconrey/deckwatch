{{- if and .Values.tracing.enabled (eq (.Values.tracing.backend | default "tempo") "tempo") }}
# Minimal Tempo single-binary config. Receivers accept OTLP over gRPC (4317)
# and HTTP (4318). Storage is local disk under /var/tempo — swap the `trace`
# stanza for `s3`/`gcs`/`azure` for a production install.
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "deckwatch.fullname" . }}-tempo-config
  labels:
    {{- include "deckwatch.labels" . | nindent 4 }}
    app.kubernetes.io/component: tracing-backend
data:
  tempo.yaml: |
    server:
      http_listen_port: 3200
      grpc_listen_port: 9095

    distributor:
      receivers:
        otlp:
          protocols:
            grpc:
              endpoint: 0.0.0.0:4317
            http:
              endpoint: 0.0.0.0:4318

    ingester:
      trace_idle_period: 10s
      max_block_duration: 5m

    compactor:
      compaction:
        block_retention: {{ .Values.tracing.tempo.retention | default "24h" }}

    storage:
      trace:
        backend: local
        local:
          path: /var/tempo/traces
        wal:
          path: /var/tempo/wal

    # Jaeger-compat query API. Enables the tracing handler's
    # `/api/traces?service=` proxy path — do not disable unless the frontend
    # is talking to an external Grafana Explore panel instead.
    query_frontend:
      search:
        default_result_limit: 20
{{- end }}
