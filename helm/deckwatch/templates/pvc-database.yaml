{{- if and .Values.database.persistence.enabled (hasPrefix "sqlite" .Values.database.url) }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "deckwatch.fullname" . }}-db
  labels:
    {{- include "deckwatch.labels" . | nindent 4 }}
spec:
  accessModes:
    - {{ .Values.database.persistence.accessMode }}
  {{- if .Values.database.persistence.storageClass }}
  storageClassName: {{ .Values.database.persistence.storageClass | quote }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.database.persistence.size }}
{{- end }}
