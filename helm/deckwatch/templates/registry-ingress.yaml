{{- if and .Values.registry.enabled .Values.registry.ingress.enabled -}}
# Public ingress for the embedded OCI registry. Do NOT enable this without
# TLS + an auth proxy in front — the /v2/* endpoints have no
# authentication of their own.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "deckwatch.fullname" . }}-registry
  labels:
    {{- include "deckwatch.labels" . | nindent 4 }}
    app.kubernetes.io/component: registry
  {{- with .Values.registry.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- with .Values.registry.ingress.className }}
  ingressClassName: {{ . }}
  {{- end }}
  {{- with .Values.registry.ingress.tls }}
  tls:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  rules:
    - host: {{ .Values.registry.ingress.host | quote }}
      http:
        paths:
          - path: /v2/
            pathType: Prefix
            backend:
              service:
                name: {{ include "deckwatch.fullname" . }}-registry
                port:
                  number: {{ .Values.registry.service.port | default 5000 }}
{{- end }}
